name: Update NBA Score Card

on:
  schedule:
    # GitHub Actions schedule supports a minimum interval of 5 minutes.
    # balldontlie Free is 5 req/min; this job uses one balldontlie /games request.
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: nba-score-card
  cancel-in-progress: false

jobs:
  update-card:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate NBA score card
        run: python generate.py
        env:
          NBA_TEAM: ${{ vars.NBA_TEAM || 'LAL' }}
          NBA_LAYOUT: ${{ vars.NBA_LAYOUT || 'full' }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}

      - name: Publish generated SVG
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/nba-card-output/output
          cp output/nba-score.svg /tmp/nba-card-output/output/nba-score.svg

          git fetch origin card-output || true
          if git show-ref --verify --quiet refs/remotes/origin/card-output; then
            git checkout -B card-output origin/card-output
          else
            git checkout --orphan card-output
            git rm -rf . || true
          fi

          mkdir -p output
          cp /tmp/nba-card-output/output/nba-score.svg output/nba-score.svg
          git add output/nba-score.svg

          if git diff --quiet --cached; then
            echo "No changes to publish"
          else
            git commit -m "Update NBA score card [skip ci]"
            git push origin card-output
          fi
